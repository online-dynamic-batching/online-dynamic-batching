<svg xmlns="http://www.w3.org/2000/svg" width="980" height="680" viewBox="0 0 980 680" role="img" aria-labelledby="title desc">
  <title id="title">ODB dynamic grouping and cross-rank alignment</title>
  <desc id="desc">An animated diagram showing rank-local token-budget grouping, group-count all-gather, split-based alignment, and aligned DDP steps.</desc>
  <style>
    :root {
      --ink: #172033;
      --muted: #657184;
      --line: #d8e0ec;
      --panel: #ffffff;
      --bg: #f7f9fc;
      --blue: #2f6fed;
      --blue-soft: #edf4ff;
      --orange: #d88a13;
      --orange-soft: #fff5e6;
      --green: #1c9c5a;
      --green-soft: #eaf8f0;
      --red: #d64545;
      --red-soft: #fff0f0;
      --violet: #6f42c1;
      --violet-soft: #f5f0ff;
    }
    .bg { fill: var(--bg); }
    .panel { fill: var(--panel); stroke: var(--line); stroke-width: 1.3; rx: 14; }
    .title { fill: var(--ink); font: 700 21px system-ui, -apple-system, Segoe UI, sans-serif; }
    .subtitle { fill: var(--muted); font: 500 13px system-ui, -apple-system, Segoe UI, sans-serif; }
    .section { fill: var(--ink); font: 700 15px system-ui, -apple-system, Segoe UI, sans-serif; }
    .label { fill: var(--ink); font: 650 12px system-ui, -apple-system, Segoe UI, sans-serif; }
    .small { fill: var(--muted); font: 500 11px system-ui, -apple-system, Segoe UI, sans-serif; }
    .mono { fill: var(--ink); font: 650 11px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .sample { rx: 5; filter: drop-shadow(0 1px 1px rgba(23,32,51,.12)); }
    .group { fill: #fff; stroke: #b9c5d6; stroke-width: 1.2; rx: 8; }
    .lane-r0 { fill: #f3f7ff; stroke: #b9cff8; stroke-width: 1.1; rx: 12; }
    .lane-r2 { fill: #effaf4; stroke: #a8ddbd; stroke-width: 1.1; rx: 12; }
    .cell { fill: #fff; stroke: #c6d5f4; stroke-width: 1.1; rx: 8; }
    .arrow { stroke: #8a95a5; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .arrow-blue { stroke: var(--blue); stroke-width: 2.2; fill: none; marker-end: url(#arrow-blue); }
    .arrow-violet { stroke: var(--violet); stroke-width: 2.2; fill: none; marker-end: url(#arrow-violet); }
    .stage1 { animation: stage1 8s ease-in-out infinite; }
    .stage2 { animation: stage2 8s ease-in-out infinite; }
    .stage3 { animation: stage3 8s ease-in-out infinite; }
    .pulse { animation: pulse 2.4s ease-in-out infinite; }
    @keyframes stage1 {
      0%, 32% { opacity: 1; }
      42%, 100% { opacity: .68; }
    }
    @keyframes stage2 {
      0%, 26% { opacity: .68; }
      36%, 62% { opacity: 1; }
      72%, 100% { opacity: .68; }
    }
    @keyframes stage3 {
      0%, 56% { opacity: .68; }
      66%, 100% { opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { opacity: .95; transform: scale(1); }
      50% { opacity: .78; transform: scale(1.02); }
    }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8a95a5"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f6fed"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6f42c1"/>
    </marker>
  </defs>

  <rect class="bg" width="980" height="680"/>
  <text class="title" x="34" y="40">ODB dynamic batching: group locally, align globally</text>
  <text class="subtitle" x="34" y="63">Each rank groups by observed token length, then exchanges lightweight group metadata to keep DDP steps aligned.</text>

  <rect class="panel" x="34" y="88" width="280" height="514"/>
  <text class="section" x="58" y="120">1. Local token-budget grouping</text>
  <text class="small" x="58" y="142">Lengths are known after runtime processing.</text>

  <g class="stage1">
    <rect class="lane-r0" x="50" y="158" width="238" height="198"/>
    <text class="label" x="58" y="178">Rank 0 observed samples</text>
    <rect class="sample" x="70" y="193" width="28" height="18" fill="var(--green)"/>
    <rect class="sample" x="104" y="193" width="30" height="18" fill="var(--green)"/>
    <rect class="sample" x="140" y="193" width="26" height="18" fill="var(--green)"/>
    <rect class="sample" x="172" y="193" width="76" height="18" fill="var(--red)"/>
    <path class="arrow" d="M 92 228 C 92 248, 92 252, 92 270"/>
    <text class="small" x="112" y="252">sort + token budget</text>
    <rect class="group" x="60" y="284" width="96" height="40"/>
    <text class="mono" x="70" y="278">r0:g0</text>
    <rect class="sample" x="74" y="296" width="20" height="16" fill="var(--green)"/>
    <rect class="sample" x="98" y="296" width="20" height="16" fill="var(--green)"/>
    <rect class="sample" x="122" y="296" width="18" height="16" fill="var(--green)"/>
    <rect class="group" x="176" y="284" width="82" height="40"/>
    <text class="mono" x="186" y="278">r0:g1</text>
    <rect class="sample" x="190" y="296" width="52" height="16" fill="var(--red)"/>
    <text class="mono" x="62" y="348">rank0 group_count = 2</text>

    <rect class="lane-r2" x="50" y="382" width="238" height="198"/>
    <text class="label" x="58" y="402">Rank 2 observed samples</text>
    <rect class="sample" x="70" y="417" width="26" height="18" fill="var(--green)"/>
    <rect class="sample" x="102" y="417" width="26" height="18" fill="var(--green)"/>
    <rect class="sample" x="134" y="417" width="44" height="18" fill="var(--orange)"/>
    <rect class="sample" x="184" y="417" width="62" height="18" fill="var(--red)"/>
    <path class="arrow" d="M 92 452 C 92 472, 92 476, 92 494"/>
    <text class="small" x="112" y="476">token budget groups</text>
    <text class="mono" x="66" y="502">r2:g0</text>
    <rect class="group" x="58" y="508" width="68" height="40"/>
    <rect class="sample" x="74" y="520" width="18" height="16" fill="var(--green)"/>
    <rect class="sample" x="96" y="520" width="18" height="16" fill="var(--green)"/>
    <text class="mono" x="144" y="502">r2:g1</text>
    <rect class="group" x="136" y="508" width="56" height="40"/>
    <rect class="sample" x="153" y="520" width="22" height="16" fill="var(--orange)"/>
    <text class="mono" x="210" y="502">r2:g2</text>
    <rect class="group" x="202" y="508" width="58" height="40"/>
    <rect class="sample" x="216" y="520" width="30" height="16" fill="var(--red)"/>
    <text class="mono" x="62" y="572">rank2 group_count = 3</text>
  </g>

  <rect class="panel" x="350" y="88" width="280" height="514"/>
  <text class="section" x="374" y="120">2. All-gather counts and align</text>
  <text class="small" x="374" y="142">Only counts and flags are exchanged.</text>
  <g class="stage2">
    <rect x="388" y="192" width="202" height="96" fill="var(--violet-soft)" stroke="#c8b5ef" rx="12"/>
    <text class="label" x="418" y="224">Gloo all_gather</text>
    <text class="mono" x="418" y="252">counts = [2, 3]</text>
    <text class="mono" x="418" y="274">target = 3 groups</text>

    <path class="arrow-violet" d="M 488 306 C 488 334, 488 342, 488 370"/>
    <text class="small" x="488" y="330" text-anchor="middle">rank 0 splits one group</text>

    <text class="mono" x="386" y="392">r0:g0a</text>
    <rect class="group" x="380" y="398" width="58" height="44"/>
    <rect class="sample" x="392" y="412" width="18" height="16" fill="var(--green)"/>
    <rect class="sample" x="414" y="412" width="18" height="16" fill="var(--green)"/>
    <text class="mono" x="460" y="392">r0:g0b</text>
    <rect class="group" x="454" y="398" width="54" height="44"/>
    <rect class="sample" x="470" y="412" width="18" height="16" fill="var(--green)"/>
    <text class="mono" x="530" y="392">r0:g1</text>
    <rect class="group" x="524" y="398" width="62" height="44"/>
    <rect class="sample" x="538" y="412" width="34" height="16" fill="var(--red)"/>
    <text class="mono" x="386" y="502">rank0 aligned_count = 3</text>
    <text class="mono" x="386" y="526">rank2 aligned_count = 3</text>
  </g>

  <rect class="panel" x="666" y="88" width="280" height="514"/>
  <text class="section" x="690" y="120">3. Step-aligned schedule</text>
  <text class="small" x="690" y="142">All ranks run equal DDP step counts.</text>
  <g class="stage3">
    <text class="mono" x="704" y="212">step</text>
    <text class="mono" x="774" y="212">rank0</text>
    <text class="mono" x="866" y="212">rank2</text>

    <text class="mono" x="710" y="256">0</text>
    <rect class="cell" x="760" y="234" width="72" height="36"/>
    <text class="mono" x="780" y="257">g0a</text>
    <rect class="cell" x="852" y="234" width="72" height="36"/>
    <text class="mono" x="874" y="257">g0</text>

    <text class="mono" x="710" y="310">1</text>
    <rect class="cell" x="760" y="288" width="72" height="36"/>
    <text class="mono" x="780" y="311">g0b</text>
    <rect class="cell" x="852" y="288" width="72" height="36"/>
    <text class="mono" x="874" y="311">g1</text>

    <text class="mono" x="710" y="364">2</text>
    <rect class="cell" x="760" y="342" width="72" height="36"/>
    <text class="mono" x="784" y="365">g1</text>
    <rect class="cell" x="852" y="342" width="72" height="36"/>
    <text class="mono" x="874" y="365">g2</text>

    <path class="arrow-blue" d="M 746 424 C 776 456, 836 456, 872 424"/>
    <text class="label" x="704" y="506">Same number of model steps</text>
    <text class="small" x="704" y="528">NCCL all-reduce stays step-aligned.</text>
  </g>

  <text class="small" x="34" y="632">Animation: local grouping -> metadata all_gather -> split-based alignment example -> DDP step-aligned schedule.</text>
  <text class="small" x="34" y="650">Overflow recirculation handles the opposite imbalance case.</text>
</svg>
